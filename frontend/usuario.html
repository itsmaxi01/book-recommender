<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Usuario</title>

</head>

<body>

    <h1>
        Tus recomendaciones
    </h1>

    <div id="recomendaciones"></div>

    <br>

    <button onclick="volverAAlimentar()">

        Volver a alimentar recomendaciones

    </button>

    <button onclick="cerrarSesion()">

        Cerrar sesión

    </button>



    <script>

        const usuario = JSON.parse(
            localStorage.getItem("usuario")
        );



        // =========================
        // CARGAR RECOMENDACIONES
        // =========================

        async function cargarRecomendaciones() {

            try {

                const response = await fetch(

                    `http://127.0.0.1:8000/recommendations/${usuario.id_usuario}`

                );

                const data = await response.json();

                const contenedor =
                    document.getElementById(
                        "recomendaciones"
                    );

                contenedor.innerHTML = "";


                data.recommendations.forEach(libro => {

                    const div =
                        document.createElement("div");

                    div.innerHTML = `

                        <h3>${libro.titulo}</h3>

                        <p>
                            ${libro.autor}
                        </p>

                        <p>
                            ${libro.genero}
                        </p>

                        <hr>

                    `;

                    contenedor.appendChild(div);

                });

            } catch (error) {

                console.log(error);

            }
        }



        // =========================
        // VOLVER A ALIMENTAR
        // =========================

        function volverAAlimentar() {

            window.location.href =
                "alimentar_motor.html";
        }



        // =========================
        // CERRAR SESION
        // =========================

        function cerrarSesion() {

            localStorage.removeItem("usuario");

            window.location.href =
                "login.html";
        }



        // =========================
        // INICIAR
        // =========================

        cargarRecomendaciones();

    </script>

</body>

</html>
