<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper" style="width: 500px;">
    <h2 id="mensajeBienvenida">Bienvenido</h2>
    
    <div id="seccionAlimentacion">
      <p style="color: #fff; margin-bottom: 10px;">Selecciona tu género favorito</p>
      <div class="input-field" style="border: none;">
        <select id="selectorGenero" style="width: 100%; height: 40px; background: rgba(255,255,255,0.2); color: #fff; border: 1px solid #ccc; border-radius: 5px; padding: 5px; outline: none;">
          <option style="color: #000;" value="fiction">Ficción</option>
          <option style="color: #000;" value="horror">Terror</option>
          <option style="color: #000;" value="sci-fi">Ciencia Ficción</option>
        </select>
      </div>
      <button type="button" style="margin-top: 15px; margin-bottom: 20px;">Guardar y ver libros</button>
    </div>

    <div id="seccionRecomendaciones" style="display: none; margin-top: 20px; margin-bottom: 20px;">
      <p style="color: #fff; margin-bottom: 10px;">Tus Recomendaciones</p>
      <ul id="listaLibros" style="color: #fff; text-align: left; padding-left: 20px;">
      </ul>
    </div>
    
    <button type="button" style="background: rgba(220, 53, 69, 0.8);">Cerrar Sesión</button>
  </div>
</body>
</html>
